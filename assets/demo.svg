<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" width="860" height="420"
     font-family="'SF Mono','JetBrains Mono','Fira Code','Menlo',monospace" font-size="13">

  <!-- Terminal window -->
  <rect width="860" height="420" rx="12" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="860" height="40" rx="12" fill="#313244"/>
  <rect y="28" width="860" height="12" fill="#313244"/>
  <circle cx="20" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="40" cy="20" r="6" fill="#febc2e"/>
  <circle cx="60" cy="20" r="6" fill="#28c840"/>
  <text x="430" y="25" text-anchor="middle" fill="#6c7086" font-size="12">claude — zsh</text>

  <!-- Shell prompt -->
  <text x="20" y="68" fill="#89dceb">❯</text>
  <text x="36" y="68" fill="#cdd6f4">claude</text>

  <!-- Simulated Claude response -->
  <text x="20" y="92" fill="#6c7086" font-size="11">Claude Code  ›  Sonnet 4.6</text>
  <text x="20" y="113" fill="#cdd6f4">I've updated auth.py and added tests. All 24 tests passed.</text>
  <text x="20" y="133" fill="#a6e3a1" font-size="12">✓  3 files changed</text>
  <text x="20" y="152" fill="#45475a" font-size="11">⎿  Read auth.py · Edit auth.py · Edit middleware.py · Write tests/test_auth.py</text>

  <!-- Separator -->
  <line x1="0" y1="166" x2="860" y2="166" stroke="#181825" stroke-width="2"/>

  <!-- State labels -->
  <text x="20" y="188" fill="#45475a" font-size="10" letter-spacing="0.8">STATUS LINE EXAMPLES</text>

  <!-- ══════════════════════════════════════════════
       ROW 1 — LOW (0-49%) — all green
       ══════════════════════════════════════════════ -->
  <rect x="0" y="194" width="860" height="34" fill="#181825"/>

  <!-- green dot -->
  <circle cx="17" cy="211" r="4" fill="#5fd700"/>

  <!-- Session: 8% → 1 filled  format: "Session █░░░░░░░░░ 8%  ↺ 18:50" -->
  <text x="30" y="216">
    <tspan fill="#585b70">Session </tspan>
    <tspan fill="#5fd700">█</tspan><tspan fill="#313244">░░░░░░░░░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#5fd700" font-weight="bold"> 8%</tspan>
    <tspan fill="#585b70">  ↺ 18:50</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">Weekly </tspan>
    <tspan fill="#5fd700">█</tspan><tspan fill="#313244">░░░░░░░░░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#5fd700" font-weight="bold">12%</tspan>
    <tspan fill="#585b70">  ↺ Jun 16 17:00</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">Context </tspan>
    <tspan fill="#5fd700">██</tspan><tspan fill="#313244">░░░░░░░░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#5fd700" font-weight="bold">22%</tspan>
    <tspan fill="#585b70">  44K/200K</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">◆ Sonnet 4.6 · Pro</tspan>
  </text>

  <!-- ══════════════════════════════════════════════
       ROW 2 — MEDIUM — yellow (50-74%) + orange (75-89%)
       ══════════════════════════════════════════════ -->
  <rect x="0" y="228" width="860" height="34" fill="#1e1e2e"/>

  <!-- yellow dot -->
  <circle cx="11" cy="245" r="4" fill="#ffd700"/>
  <!-- orange dot (overlay to show mixed) -->
  <circle cx="22" cy="245" r="4" fill="#ff8700"/>

  <!-- Session: 54% → 5 filled (yellow) | Weekly: 76% → 8 filled (orange) | Context: 62% → 6 filled (yellow) -->
  <text x="30" y="250">
    <tspan fill="#585b70">Session </tspan>
    <tspan fill="#ffd700">█████</tspan><tspan fill="#313244">░░░░░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#ffd700" font-weight="bold">54%</tspan>
    <tspan fill="#585b70">  ↺ 14:40</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">Weekly </tspan>
    <tspan fill="#ff8700">████████</tspan><tspan fill="#313244">░░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#ff8700" font-weight="bold">76%</tspan>
    <tspan fill="#585b70">  ↺ Jun 15 09:00</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">Context </tspan>
    <tspan fill="#ffd700">██████</tspan><tspan fill="#313244">░░░░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#ffd700" font-weight="bold">62%</tspan>
    <tspan fill="#585b70">  124K/200K</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">◆ Sonnet 4.6 · Pro</tspan>
  </text>

  <!-- ══════════════════════════════════════════════
       ROW 3 — HIGH — orange (75-89%) + red ⚠ (≥90%)
       ══════════════════════════════════════════════ -->
  <rect x="0" y="262" width="860" height="34" fill="#181825"/>

  <!-- orange + red dots -->
  <circle cx="11" cy="279" r="4" fill="#ff8700"/>
  <circle cx="22" cy="279" r="4" fill="#ff0000"/>

  <!-- Session: 91% → 9 filled (red) | Weekly: 84% → 8 filled (orange) | Context: 93% → 9 filled (red) -->
  <!-- Note: warn=True → note becomes "⚠ ↺ HH:MM" with ⚠ in red bold -->
  <text x="30" y="284">
    <tspan fill="#585b70">Session </tspan>
    <tspan fill="#ff0000">█████████</tspan><tspan fill="#313244">░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#ff0000" font-weight="bold">91%</tspan>
    <tspan fill="#ff0000" font-weight="bold">  ⚠ </tspan><tspan fill="#585b70">↺ 02:10</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">Weekly </tspan>
    <tspan fill="#ff8700">████████</tspan><tspan fill="#313244">░░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#ff8700" font-weight="bold">84%</tspan>
    <tspan fill="#585b70">  ↺ Jun 14 22:00</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">Context </tspan>
    <tspan fill="#ff0000">█████████</tspan><tspan fill="#313244">░</tspan>
    <tspan fill="#585b70"> </tspan>
    <tspan fill="#ff0000" font-weight="bold">93%</tspan>
    <tspan fill="#ff0000" font-weight="bold">  ⚠ </tspan><tspan fill="#585b70">186K/200K</tspan>
    <tspan fill="#45475a">  │  </tspan>
    <tspan fill="#585b70">◆ Sonnet 4.6 · Pro</tspan>
  </text>

  <!-- ══════════════════════════════════════════════
       LEGEND
       ══════════════════════════════════════════════ -->
  <line x1="0" y1="296" x2="860" y2="296" stroke="#313244" stroke-width="1"/>

  <text x="20" y="316" fill="#45475a" font-size="11">Color key:</text>

  <circle cx="98" cy="312" r="5" fill="#5fd700"/>
  <text x="108" y="316" fill="#6c7086" font-size="11">0–49%</text>

  <circle cx="163" cy="312" r="5" fill="#ffd700"/>
  <text x="173" y="316" fill="#6c7086" font-size="11">50–74%</text>

  <circle cx="236" cy="312" r="5" fill="#ff8700"/>
  <text x="246" y="316" fill="#6c7086" font-size="11">75–89%</text>

  <circle cx="311" cy="312" r="5" fill="#ff0000"/>
  <text x="321" y="316" fill="#6c7086" font-size="11">≥ 90%  ⚠</text>

  <text x="530" y="316" fill="#313244" font-size="11">auto-renders after every response · zero tokens consumed</text>

  <!-- Next prompt + blinking cursor -->
  <text x="20" y="358" fill="#89dceb">❯</text>
  <rect x="36" y="345" width="8" height="15" fill="#cdd6f4" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

</svg>
